name: CI
on:
  pull_request:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # 按你项目实际命令调整下面三行
      - run: npm ci || npm install
      - run: npm run lint --if-present
      - run: npm test --if-present
